<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图标生成器 - 一次性使用</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1e3c72; color: #fff; padding: 20px; }
  canvas { background: transparent; display: block; margin: 10px 0; border: 1px dashed #ffd89b; }
  button { background: #ffd89b; color: #1e3c72; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; margin: 4px; font-weight: 600; }
  a { color: #ffd89b; }
</style>
</head>
<body>
<h1>应用图标生成器</h1>
<p>页面打开后自动生成 4 张图标，点击对应按钮下载到与 index.html 同目录。</p>
<div id="log"></div>
<button id="dlAll">一键下载全部 4 张 PNG</button>
<div id="imgs"></div>

<script>
const sizes = [
  { name: "icon-192.png", size: 192, maskable: false },
  { name: "icon-512.png", size: 512, maskable: false },
  { name: "icon-maskable-192.png", size: 192, maskable: true },
  { name: "icon-maskable-512.png", size: 512, maskable: true }
];

const cache = {};

function drawIcon(canvas, size, maskable) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  // 背景渐变
  const g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, "#1e3c72");
  g.addColorStop(0.5, "#2a5298");
  g.addColorStop(1, "#7e2ea0");
  // maskable 安全区为内切 80% 圆角矩形
  const radius = maskable ? size * 0.4 : size * 0.1875;
  const inset = maskable ? 0 : size * 0.05;
  const w = size - inset * 2;
  ctx.fillStyle = g;
  roundRect(ctx, inset, inset, w, w, radius);
  ctx.fill();

  // 同心圆环
  const cx = size/2, cy = size/2;
  ctx.strokeStyle = "#ffd89b";
  ctx.lineWidth = size * 0.025;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.32, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,216,155,0.4)";
  ctx.lineWidth = size * 0.012;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.22, 0, Math.PI * 2);
  ctx.stroke();

  // 时针/分针
  ctx.strokeStyle = "#ffd89b";
  ctx.lineWidth = size * 0.04;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx, cy - size * 0.27);
  ctx.lineTo(cx, cy);
  ctx.lineTo(cx + size * 0.20, cy + size * 0.12);
  ctx.stroke();

  // 中心圆点
  ctx.fillStyle = "#ffd89b";
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.035, 0, Math.PI * 2);
  ctx.fill();

  // 文字 REFRESH
  ctx.fillStyle = "#ffd89b";
  ctx.font = `bold ${size * 0.125}px "Segoe UI", sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("REFRESH", cx, cy + size * 0.36);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function gen() {
  const wrap = document.getElementById("imgs");
  wrap.innerHTML = "";
  sizes.forEach(s => {
    const c = document.createElement("canvas");
    drawIcon(c, s.size, s.maskable);
    cache[s.name] = c;
    const div = document.createElement("div");
    div.innerHTML = `<p>${s.name} (${s.size}px${s.maskable ? " maskable" : ""})</p>`;
    div.appendChild(c);
    const btn = document.createElement("button");
    btn.textContent = "下载 " + s.name;
    btn.onclick = () => download(s.name);
    div.appendChild(btn);
    wrap.appendChild(div);
  });
}

function download(name) {
  const c = cache[name];
  if (!c) return;
  c.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, "image/png");
}

document.getElementById("dlAll").onclick = () => {
  sizes.forEach((s, i) => setTimeout(() => download(s.name), i * 400));
};

gen();
</script>
</body>
</html>
